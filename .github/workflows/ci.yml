# AURORA_AIM CI/CD 工作流 (极简版)
# 目标：2 分钟内完成

name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  BUILD_TYPE: Release

jobs:
  # ============================================
  # 格式检查 + 构建（合并为一个 job）
  # ============================================
  build:
    name: 构建测试
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          # LLVM 源（用于 clang-19 和 clang-format-19）
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          
          # 安装所有依赖
          sudo apt-get install -y \
            clang-19 clang++-19 clang-format-19 \
            cmake ninja-build \
            libopencv-dev libeigen3-dev libboost-all-dev \
            libspdlog-dev libyaml-cpp-dev catch2 \
            libceres-dev libtbb-dev

      - name: 检查代码格式
        run: |
          echo "🔍 检查代码格式..."
          FAILED=0
          while IFS= read -r -d '' file; do
            if ! clang-format-19 --dry-run --Werror "$file" 2>/dev/null; then
              echo "❌ $file"
              FAILED=1
            fi
          done < <(find . -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) \
            -not -path "./build/*" -not -path "./vcpkg_installed/*" -print0)
          
          if [ $FAILED -eq 1 ]; then
            echo "格式检查失败，请运行: clang-format -i **/*.cpp **/*.hpp **/*.h"
            exit 1
          fi
          echo "✅ 格式正确"

      - name: 配置 CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19

      - name: 构建
        run: cmake --build build -j $(nproc)

      - name: 测试
        run: ctest --test-dir build --output-on-failure -j $(nproc)
